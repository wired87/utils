dim:
  - 700.0 # w
  - 700.0 # h
  - 700.0 # d

# STANDARD PARAMS
L_xyz: [1e-9, 1e-9, 1e-9] #  the size of the room
k_e: 8.9875517923e9
k_B: 1.380649e-23
epsilon_0: 8.854187817e-12
G: 6.67430e-11
#M: 5.972e24 # default from earth -> useless in a bare/vacuum env
speed_light: 299792458
planck_constant: 6.626e-34
time: 0.0 # total time sim is running
timestep: .01 # time step forward after each iter
m_factor: 10000
init: True
dx: 0.0
EC:
  QF:
    rel: has_component
    edge_attrs: physics/quantum_fields/content/qf_edge.yaml

  PARTICLE:
    rel: has_component
    edge_attrs: physics/quantum_fields/content/qf_particle_edge.yaml

  QFN:
    rel: has_component
    edge_attrs: physics/quantum_fields/content/qf_qfn_edge.yaml
