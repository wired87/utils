- name: Compute Distance Vector
  description: "Compute the vector from the center to the position."
  returns: "r_vec"
  equation: "np.array(pos2) - np.array(pos1)"
  parameters:
    - name: pos1
      type: np.ndarray
    - name: pos2
      type: np.ndarray

- name: Compute Distance Magnitude
  description: "Compute the Euclidean norm (distance) between pos and center."
  returns: "r"
  equation: "np.linalg.norm(r_vec)"
  parameters:
    - name: r_vec
      type: np.ndarray

- name: Compute Gravitational Magnitude
  description: "Calculate the gravitational field magnitude at a given distance."
  returns: "g_mag"
  equation: "G * (mass1 * mass2) / r**2"
  parameters:
    - name: G
      type: float
    - name: mass1
      type: float
    - name: mass2
      type: float
    - name: r
      type: float

- name: Compute Gravity Vector
  description: "Compute the gravity vector at a given position from the center of the Earth."
  returns: "g_vec"
  equation: "-g_mag * (r_vec / r)"
  parameters:
    - name: g_mag
      type: float
    - name: r_vec
      type: np.ndarray
    - name: r
      type: float
